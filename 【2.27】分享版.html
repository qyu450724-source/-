        // ==================== 聊天窗口渲染 ====================
        function renderChatWindows() {
            var container = document.getElementById('chatContainer');
            var wcLabel = document.getElementById('wcLabel');
            var wcDec = document.getElementById('wcDec');
            var wcInc = document.getElementById('wcInc');
            if (wcLabel) wcLabel.textContent = winCount + ' 窗口';
            if (wcDec) wcDec.disabled = winCount <= 2;
            if (wcInc) wcInc.disabled = winCount >= 4;

            var displayWindows = config.windows.slice(0, winCount);
            
            // 构建数据源下拉选项
            function buildSourceOptions(w) {
                var options = '';
                var cozeGroup = config.coze.workflows.map(function(cw, ci) {
                    var selected = w.source === 'coze' && w.cozeIndex === ci ? 'selected' : '';
                    return '<option value="coze:' + ci + '" ' + selected + '>' + (cw && cw.name ? cw.name : '工作流' + (ci + 1)) + '</option>';
                }).join('');
                var platformGroup = config.platforms.map(function(p, pi) {
                    if (!p.connected) return '';
                    var selected = w.source === 'platform' && w.platformIndex === pi ? 'selected' : '';
                    return '<option value="platform:' + pi + '" ' + selected + '>' + p.name + '</option>';
                }).join('');
                if (cozeGroup) options += '<optgroup label="Coze工作流">' + cozeGroup + '</optgroup>';
                if (platformGroup) options += '<optgroup label="第三方API">' + platformGroup + '</optgroup>';
                return options;
            }

            // 构建 HTML，窗口之间插拖拽分隔线
            var html = '';
            displayWindows.forEach(function(w, idx) {
                html += '<div class="chat-window" data-window-id="' + w.id + '" style="flex:1 1 0;min-width:180px;">';
                html += '<div class="chat-header">';
                html += '<div class="chat-header-left"><select class="source-select" data-window-id="' + w.id + '" title="选择数据源">' + buildSourceOptions(w) + '</select></div>';
                html += '<div class="chat-header-actions">';
                html += '<button class="chat-header-btn reset-width-btn" title="恢复等宽">⇔</button>';
                html += '<button class="chat-header-btn clear-win" data-id="' + w.id + '" title="清空">🗑️</button>';
                html += '<button class="chat-header-btn stop-win" data-id="' + w.id + '" disabled title="停止">⏹️</button>';
                html += '</div></div>';
                html += '<div class="chat-messages" id="messages-' + w.id + '">' + renderMessages(w.id) + '</div>';
                html += '</div>';
                if (idx < displayWindows.length - 1) {
                    html += '<div class="chat-resizer"></div>';
                }
            });
            container.innerHTML = html;

            // 数据源切换
            container.querySelectorAll('.source-select').forEach(function(select) {
                select.addEventListener('change', function() {
                    var windowId = select.dataset.windowId;
                    var winConfig = config.windows.find(function(w) { return w.id === windowId; });
                    if (!winConfig) return;
                    var value = select.value;
                    if (value.startsWith('coze:')) {
                        winConfig.source = 'coze';
                        winConfig.cozeIndex = parseInt(value.split(':')[1]);
                        winConfig.platformIndex = -1;
                    } else if (value.startsWith('platform:')) {
                        winConfig.source = 'platform';
                        winConfig.platformIndex = parseInt(value.split(':')[1]);
                    }
                    saveConfig();
                    renderChatWindows();
                });
            });

            // 拖拽分隔线
            container.querySelectorAll('.chat-resizer').forEach(function(resizer) {
                resizer.addEventListener('mousedown', function(e) {
                    e.preventDefault();
                    resizer.classList.add('active');
                    var prev = resizer.previousElementSibling;
                    var next = resizer.nextElementSibling;
                    var startX = e.clientX;
                    var prevW = prev.getBoundingClientRect().width;
                    var nextW = next.getBoundingClientRect().width;
                    document.body.style.cursor = 'col-resize';
                    document.body.style.userSelect = 'none';
                    function onMove(e) {
                        var dx = e.clientX - startX;
                        var np = Math.max(180, prevW + dx);
                        var nn = Math.max(180, nextW - dx);
                        prev.style.flex = 'none';
                        prev.style.width = np + 'px';
                        next.style.flex = 'none';
                        next.style.width = nn + 'px';
                    }
                    function onUp() {
                        resizer.classList.remove('active');
                        document.body.style.cursor = '';
                        document.body.style.userSelect = '';
                        document.removeEventListener('mousemove', onMove);
                        document.removeEventListener('mouseup', onUp);
                    }
                    document.addEventListener('mousemove', onMove);
                    document.addEventListener('mouseup', onUp);
                });
            });

            // 恢复等宽（任意一个按钮都能重置所有窗口）
            container.querySelectorAll('.reset-width-btn').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    container.querySelectorAll('.chat-window').forEach(function(w) {
                        w.style.flex = '1 1 0';
                        w.style.width = '';
                    });
                    showToast('已恢复等宽', 'success');
                });
            });

            // 清空 & 停止按钮
            container.querySelectorAll('.clear-win').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    chatHistories[btn.dataset.id] = [];
                    saveChatHistories();
                    // 同时清除 Coze 对话 ID，重置记忆
                    delete cozeConversationIds[btn.dataset.id];
                    document.getElementById('messages-' + btn.dataset.id).innerHTML = '';
                    showToast('已清空（对话记忆已重置）', 'success');
                });
            });
            container.querySelectorAll('.stop-win').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    if (abortControllers[btn.dataset.id]) {
                        abortControllers[btn.dataset.id].abort();
                        abortControllers[btn.dataset.id] = null;
                    }
                    btn.disabled = true;
                });
            });
        }

        function renderMessages(windowId) {
            const history = chatHistories[windowId] || [];
            return history.map(msg => {
                const content = msg.role === 'ai' ? renderMarkdown(msg.content) : escapeHtml(msg.content);
                return `<div class="message message-${msg.role} ${msg.loading ? 'message-loading' : ''}">${content}</div>`;
            }).join('');
        }

        function addMessage(windowId, content, role, loading = false) {
            if (!chatHistories[windowId]) chatHistories[windowId] = [];
            chatHistories[windowId].push({ role, content, loading });
            saveChatHistories();
            
            const container = document.getElementById(`messages-${windowId}`);
            if (container) {
                const div = document.createElement('div');
                div.className = `message message-${role} ${loading ? 'message-loading' : ''}`;
                if (loading && role === 'ai') {
                    div.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
                } else {
                    div.innerHTML = role === 'ai' ? renderMarkdown(content) : escapeHtml(content);
                }
                // 只有 AI 消息才添加按钮，用户消息不加任何按钮
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
            }
            return chatHistories[windowId].length - 1;
        }

        function updateMessage(windowId, index, content, loading = false) {
            if (chatHistories[windowId]?.[index]) {
                chatHistories[windowId][index].content = content;
                chatHistories[windowId][index].loading = loading;
                saveChatHistories();
                
                const container = document.getElementById(`messages-${windowId}`);
                const msgs = container?.querySelectorAll('.message-ai');
                if (msgs?.length) {
                    const last = msgs[msgs.length - 1];
                    last.innerHTML = renderMarkdown(content);
                    if (!loading) {
                        last.classList.remove('message-loading');
                        
                        // 添加按钮工具栏（复制 + 重新回答）
                        const actionsDiv = document.createElement('div');
                        actionsDiv.className = 'msg-actions';
                        
                        // 复制按钮
                        const copyBtn = document.createElement('button');
                        copyBtn.className = 'msg-action-btn';
                        copyBtn.title = '复制';
                        copyBtn.innerHTML = '📋';
                        copyBtn.onclick = () => {
                            navigator.clipboard.writeText(content);
                            copyBtn.innerHTML = '✓';
                            setTimeout(() => copyBtn.innerHTML = '📋', 1500);
                        };
                        actionsDiv.appendChild(copyBtn);
                        
                        // 重新回答按钮
                        const retryBtn = document.createElement('button');
                        retryBtn.className = 'msg-action-btn retry-btn';
                        retryBtn.title = '重新回答';
                        retryBtn.innerHTML = '🔄';
                        retryBtn.onclick = () => retryWindow(windowId);
                        actionsDiv.appendChild(retryBtn);
                        
                        last.appendChild(actionsDiv);
                        
                        // 提取联网搜索来源并添加面板
                        const { hasSearch, sources } = extractWebSources(content);
                        const sourcePanel = renderSourcePanel(sources, hasSearch);
                        last.appendChild(sourcePanel);
                    }
                    container.scrollTop = container.scrollHeight;
                }
            }
        }

        // ==================== 重新回答单个窗口 ====================
        async function retryWindow(windowId) {
            const win = config.windows.find(w => w.id === windowId);
            if (!win) return;
            
            // 获取最后一条用户消息
            const history = chatHistories[windowId] || [];
            const lastUserMsg = [...history].reverse().find(m => m.role === 'user');
            if (!lastUserMsg) {
                showToast('没有找到用户问题', 'warning');
                return;
            }
            
            // 删除最后一条AI回复
            const lastAiIdx = history.findLastIndex(m => m.role === 'ai');
            if (lastAiIdx !== -1) {
                history.splice(lastAiIdx, 1);
                saveChatHistories();
            }
            
            // 重新渲染消息列表
            renderChatMessages(windowId);
            
            // 确定调用类型
            let canCall = false;
            let callType = '';
            let callIndex = -1;
            let prompt = lastUserMsg.content;
            
            if (win.source === 'coze') {
                const cw = config.coze.workflows[win.cozeIndex];
                if (config.coze.apiToken && cw?.workflowId) {
                    canCall = true;
                    callType = 'coze';
                    callIndex = win.cozeIndex;
                    if (win.systemPrompt) prompt = `${win.systemPrompt}\n\n用户问题：${lastUserMsg.content}`;
                }
            } else if (win.source === 'platform' && win.platformIndex >= 0) {
                const pc = config.platforms[win.platformIndex];
                if (pc?.connected && pc?.model) {
                    canCall = true;
                    callType = 'platform';
                    callIndex = win.platformIndex;
                    if (win.systemPrompt) prompt = `${win.systemPrompt}\n\n用户问题：${lastUserMsg.content}`;
                }
            }
            
            if (!canCall) {
                showToast('该窗口未配置数据源', 'error');
                return;
            }
            
            // 添加新的AI消息占位
            const msgIdx = addMessage(windowId, '', 'ai', true);
            
            const controller = new AbortController();
            abortControllers[windowId] = controller;
            
            let fullAnswer = '';
            
            try {
                const onChunk = (chunk) => {
                    fullAnswer += chunk;
                    updateMessage(windowId, msgIdx, fullAnswer, true);
                };
                
                if (callType === 'coze') {
                    const convId = cozeConversationIds[windowId] || null;
                    const cozeResult = await callCozeWorkflow(
                        config.coze.workflows[callIndex].workflowId,
                        prompt, onChunk, controller.signal, convId, null
                    );
                    if (cozeResult.convId) cozeConversationIds[windowId] = cozeResult.convId;
                } else if (callType === 'platform') {
                    await callPlatformAPI(callIndex, prompt, onChunk, controller.signal);
                }
                
                const finalAnswer = fullAnswer || '（无输出）';
                updateMessage(windowId, msgIdx, finalAnswer, false);
                showToast('重新回答完成', 'success');
            } catch (err) {
                if (err.name === 'AbortError') {
                    updateMessage(windowId, msgIdx, '已停止', false);
                } else {
                    updateMessage(windowId, msgIdx, `错误：${err.message}`, false);
                    showToast(`重新回答失败：${err.message}`, 'error');
                }
            } finally {
                abortControllers[windowId] = null;
            }
        }

        // ==================== 渲染聊天消息列表 ====================
        function renderChatMessages(windowId) {
            const container = document.getElementById(`messages-${windowId}`);
            if (!container) return;
            
            const history = chatHistories[windowId] || [];
            container.innerHTML = '';
            
            history.forEach((msg, idx) => {
                const div = document.createElement('div');
                div.className = `message message-${msg.role}${msg.loading ? ' message-loading' : ''}`;
                
                if (msg.role === 'user') {
                    div.textContent = msg.content;
                } else {
                    div.innerHTML = renderMarkdown(msg.content);
                    if (!msg.loading) {
                        // 添加按钮工具栏
                        const actionsDiv = document.createElement('div');
                        actionsDiv.className = 'msg-actions';
                        
                        const copyBtn = document.createElement('button');
                        copyBtn.className = 'msg-action-btn';
                        copyBtn.title = '复制';
                        copyBtn.innerHTML = '📋';
                        copyBtn.onclick = () => {
                            navigator.clipboard.writeText(msg.content);
                            copyBtn.innerHTML = '✓';
                            setTimeout(() => copyBtn.innerHTML = '📋', 1500);
                        };
                        actionsDiv.appendChild(copyBtn);
                        
                        const retryBtn = document.createElement('button');
                        retryBtn.className = 'msg-action-btn retry-btn';
                        retryBtn.title = '重新回答';
                        retryBtn.innerHTML = '🔄';
                        retryBtn.onclick = () => retryWindow(windowId);
                        actionsDiv.appendChild(retryBtn);
                        
                        div.appendChild(actionsDiv);
                        
                        // 联网来源面板
                        const { hasSearch, sources } = extractWebSources(msg.content);
                        const sourcePanel = renderSourcePanel(sources, hasSearch);
                        div.appendChild(sourcePanel);
                    }
                }
                
                container.appendChild(div);
            });
            
            container.scrollTop = container.scrollHeight;
        }

        // ==================== API调用 ====================
        async function callCozeWorkflow(workflowId, prompt, onChunk, signal, conversationId, onSources) {
            console.log('[对话流] workflow_id:', workflowId, '| 本次传入 conversation_id:', conversationId || '无（首次）');

            const requestBody = {
                workflow_id: workflowId,
                additional_messages: [
                    { role: 'user', content: prompt, content_type: 'text' }
                ],
                parameters: {}
            };

            if (config.coze.botId) {
                requestBody.bot_id = config.coze.botId;
            }

            if (conversationId) {
                requestBody.conversation_id = conversationId;
            }

            const response = await fetch(`${config.coze.baseUrl}/v1/workflows/chat`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${config.coze.apiToken}`,
                    'Content-Type': 'application/json',
                    'Accept': 'text/event-stream'
                },
                body: JSON.stringify(requestBody),
                signal
            });

            if (!response.ok) {
                const errData = await response.json().catch(() => ({}));
                console.error('[对话流] API错误:', errData);
                throw new Error(errData.msg || errData.message || `HTTP ${response.status}`);
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            let hasOutput = false;
            let returnedConvId = null;
            let currentEvent = '';
            const sources = []; // 收集联网搜索来源

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop() || '';

                for (const line of lines) {
                    if (line.startsWith('event:')) {
                        currentEvent = line.slice(6).trim();
                    } else if (line.startsWith('data:')) {
                        const raw = line.slice(5).trim();
                        if (!raw || raw === '[DONE]') continue;
                        try {
                            const json = JSON.parse(raw);

                            // 提取 conversation_id
                            if (!returnedConvId && json.conversation_id) {
                                returnedConvId = json.conversation_id;
                                console.log('%c[对话流] ✅ conversation_id: ' + returnedConvId, 'color:green;font-weight:bold');
                            }

                            // ===== 完整事件日志（调试用）=====
                            // 打印所有事件的详细信息，便于调试
                            console.log('[Coze事件]', currentEvent, '| type:', json.type, '| 完整数据:', JSON.stringify(json, null, 2));

                            // 提取联网搜索来源 - 在所有事件中搜索
                            const extractSources = (obj) => {
                                if (!obj || typeof obj !== 'object') return;
                                if (Array.isArray(obj)) { obj.forEach(extractSources); return; }

                                // 检查 source 数组
                                if (obj.source && Array.isArray(obj.source)) {
                                    console.log('[对话流] 发现 source 数组:', obj.source);
                                    obj.source.forEach(s => {
                                        if (s?.url) sources.push({ url: s.url, title: s.title || s.sitename || s.url });
                                    });
                                }
                                // 检查 doc_results 数组
                                if (obj.doc_results && Array.isArray(obj.doc_results)) {
                                    console.log('[对话流] 发现 doc_results 数组:', obj.doc_results);
                                    obj.doc_results.forEach(s => {
                                        if (s?.url) sources.push({ url: s.url, title: s.title || s.sitename || s.url });
                                    });
                                }
                                // 检查 results 数组
                                if (obj.results && Array.isArray(obj.results)) {
                                    console.log('[对话流] 发现 results 数组:', obj.results);
                                    obj.results.forEach(s => {
                                        if (s?.url) sources.push({ url: s.url, title: s.title || s.sitename || s.url });
                                    });
                                }
                                // 检查 search_results 数组
                                if (obj.search_results && Array.isArray(obj.search_results)) {
                                    console.log('[对话流] 发现 search_results 数组:', obj.search_results);
                                    obj.search_results.forEach(s => {
                                        if (s?.url) sources.push({ url: s.url, title: s.title || s.sitename || s.url });
                                    });
                                }
                                // 检查 web_pages 数组
                                if (obj.web_pages && Array.isArray(obj.web_pages)) {
                                    console.log('[对话流] 发现 web_pages 数组:', obj.web_pages);
                                    obj.web_pages.forEach(s => {
                                        if (s?.url) sources.push({ url: s.url, title: s.title || s.sitename || s.name || s.url });
                                    });
                                }
                                // 检查 links 数组
                                if (obj.links && Array.isArray(obj.links)) {
                                    console.log('[对话流] 发现 links 数组:', obj.links);
                                    obj.links.forEach(s => {
                                        if (s?.url) sources.push({ url: s.url, title: s.title || s.sitename || s.name || s.url });
                                    });
                                }
                                // 检查单个 url 字段（带title）
                                if (obj.url && typeof obj.url === 'string' && obj.url.startsWith('http') && obj.title) {
                                    sources.push({ url: obj.url, title: obj.title || obj.sitename || obj.name });
                                }
                                // 递归搜索
                                Object.values(obj).forEach(extractSources);
                            };

                            // 对每个事件都尝试提取来源
                            extractSources(json);

                            // 提取联网搜索来源（支持多种事件类型和数据结构）
                            // 1. tool_response 类型
                            if (json.type === 'tool_response' && json.content) {
                                console.log('[对话流] tool_response raw:', json.content.slice(0, 500));
                                try {
                                    const toolData = typeof json.content === 'string'
                                        ? JSON.parse(json.content) : json.content;

                                    // 插件1结构: data.source[].{url, title, sitename}
                                    const arr1 = toolData?.data?.source;
                                    if (Array.isArray(arr1)) {
                                        arr1.forEach(item => {
                                            if (item?.url) sources.push({
                                                url: item.url,
                                                title: item.title || item.sitename || item.url
                                            });
                                        });
                                        console.log('[对话流] 插件1来源数:', arr1.length);
                                    }

                                    // 插件2结构: data.doc_results[].{url, title, sitename}
                                    const arr2 = toolData?.data?.doc_results;
                                    if (Array.isArray(arr2)) {
                                        arr2.forEach(item => {
                                            if (item?.url) sources.push({
                                                url: item.url,
                                                title: item.title || item.sitename || item.url
                                            });
                                        });
                                        console.log('[对话流] 插件2来源数:', arr2.length);
                                    }

                                    // 兜底：递归找所有 url 字段
                                    if (!arr1 && !arr2) {
                                        const walk = (obj) => {
                                            if (!obj || typeof obj !== 'object') return;
                                            if (Array.isArray(obj)) { obj.forEach(walk); return; }
                                            if (obj.url && typeof obj.url === 'string' && obj.url.startsWith('http')) {
                                                sources.push({ url: obj.url, title: obj.title || obj.sitename || obj.url });
                                            }
                                            Object.values(obj).forEach(walk);
                                        };
                                        walk(toolData);
                                    }
                                } catch(e) {
                                    console.warn('[对话流] tool_response 解析失败:', e.message);
                                }
                            }

                            // 2. 检查 tool_calls 或 tools 相关字段
                            if (json.tool_calls || json.tools) {
                                const tools = json.tool_calls || json.tools;
                                console.log('[对话流] 检测到 tool_calls/tools:', tools);
                                const walk = (obj) => {
                                    if (!obj || typeof obj !== 'object') return;
                                    if (Array.isArray(obj)) { obj.forEach(walk); return; }
                                    if (obj.url && typeof obj.url === 'string' && obj.url.startsWith('http')) {
                                        sources.push({ url: obj.url, title: obj.title || obj.name || obj.url });
                                    }
                                    Object.values(obj).forEach(walk);
                                };
                                walk(tools);
                            }

                            // 3. 检查 content 中是否包含 URL 数据（某些插件直接在content里返回）
                            if (json.content && typeof json.content === 'object') {
                                const walk = (obj) => {
                                    if (!obj || typeof obj !== 'object') return;
                                    if (Array.isArray(obj)) { obj.forEach(walk); return; }
                                    if (obj.url && typeof obj.url === 'string' && obj.url.startsWith('http')) {
                                        sources.push({ url: obj.url, title: obj.title || obj.sitename || obj.url });
                                    }
                                    if (obj.source && Array.isArray(obj.source)) {
                                        obj.source.forEach(s => {
                                            if (s?.url) sources.push({ url: s.url, title: s.title || s.sitename || s.url });
                                        });
                                    }
                                    if (obj.doc_results && Array.isArray(obj.doc_results)) {
                                        obj.doc_results.forEach(s => {
                                            if (s?.url) sources.push({ url: s.url, title: s.title || s.sitename || s.url });
                                        });
                                    }
                                    Object.values(obj).forEach(walk);
                                };
                                walk(json.content);
                            }

                            // 4. 检查 output 字段（某些工作流结构）
                            if (json.output) {
                                const walk = (obj) => {
                                    if (!obj || typeof obj !== 'object') return;
                                    if (Array.isArray(obj)) { obj.forEach(walk); return; }
                                    if (obj.url && typeof obj.url === 'string' && obj.url.startsWith('http')) {
                                        sources.push({ url: obj.url, title: obj.title || obj.sitename || obj.url });
                                    }
                                    if (obj.source && Array.isArray(obj.source)) {
                                        obj.source.forEach(s => {
                                            if (s?.url) sources.push({ url: s.url, title: s.title || s.sitename || s.url });
                                        });
                                    }
                                    if (obj.doc_results && Array.isArray(obj.doc_results)) {
                                        obj.doc_results.forEach(s => {
                                            if (s?.url) sources.push({ url: s.url, title: s.title || s.sitename || s.url });
                                        });
                                    }
                                    Object.values(obj).forEach(walk);
                                };
                                walk(json.output);
                            }

                            // 5. 处理 verbose 类型事件（Coze对话流实际返回的事件类型）
                            if (json.type === 'verbose' && json.content) {
                                console.log('[对话流] verbose事件 content:', typeof json.content === 'string' ? json.content.slice(0, 500) : json.content);
                                try {
                                    // content 可能是 JSON 字符串或对象
                                    const contentData = typeof json.content === 'string'
                                        ? JSON.parse(json.content) : json.content;

                                    console.log('[对话流] verbose content解析后:', contentData);

                                    // 递归查找所有来源
                                    const walk = (obj) => {
                                        if (!obj || typeof obj !== 'object') return;
                                        if (Array.isArray(obj)) { obj.forEach(walk); return; }

                                        // 检查 source 数组
                                        if (obj.source && Array.isArray(obj.source)) {
                                            obj.source.forEach(s => {
                                                if (s?.url) sources.push({ url: s.url, title: s.title || s.sitename || s.url });
                                            });
                                        }
                                        // 检查 doc_results 数组
                                        if (obj.doc_results && Array.isArray(obj.doc_results)) {
                                            obj.doc_results.forEach(s => {
                                                if (s?.url) sources.push({ url: s.url, title: s.title || s.sitename || s.url });
                                            });
                                        }
                                        // 检查 results 数组
                                        if (obj.results && Array.isArray(obj.results)) {
                                            obj.results.forEach(s => {
                                                if (s?.url) sources.push({ url: s.url, title: s.title || s.sitename || s.url });
                                            });
                                        }
                                        // 检查单个 url
                                        if (obj.url && typeof obj.url === 'string' && obj.url.startsWith('http')) {
                                            sources.push({ url: obj.url, title: obj.title || obj.sitename || obj.name || obj.url });
                                        }
                                        Object.values(obj).forEach(walk);
                                    };
                                    walk(contentData);
                                } catch(e) {
                                    console.warn('[对话流] verbose content解析失败:', e.message);
                                }
                            }

                            // 流式文本片段
                            if (currentEvent === 'conversation.message.delta' &&
                                json.type === 'answer' && json.role === 'assistant' && json.content) {
                                hasOutput = true;
                                onChunk(json.content);
                            }
                        } catch (e) {
                            console.warn('[对话流] 解析失败:', raw.slice(0, 80));
                        }
                    }
                }
            }

            // 去重并回调
            const uniqueSources = sources.filter((s, i, arr) =>
                arr.findIndex(x => x.url === s.url) === i
            );
            if (uniqueSources.length > 0 && onSources) {
                onSources(uniqueSources);
            }
            console.log('[对话流] 联网来源数:', uniqueSources.length, uniqueSources);

            if (!hasOutput) {
                console.warn('[对话流] ⚠️ 无输出！请检查工作流是否已发布');
            }

            return { convId: returnedConvId || conversationId, sources: uniqueSources };
        }

        async function callPlatformAPI(platformIndex, prompt, onChunk, signal) {
            const pc = config.platforms[platformIndex];
            
            console.log('调用第三方API:', platformIndex, '配置:', pc);
            
            if (!pc?.connected || !pc?.apiKey) throw new Error('请先连接平台');
            if (!pc?.model) throw new Error('请先选择模型');

            console.log('请求URL:', `${pc.baseUrl}/v1/chat/completions`);
            console.log('请求模型:', pc.model);

            const response = await fetch(`${pc.baseUrl}/v1/chat/completions`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${pc.apiKey}`,
                    'Content-Type': 'application/json',
                    'Accept': 'text/event-stream'
                },
                body: JSON.stringify({
                    model: pc.model,
                    messages: [{ role: 'user', content: prompt }],
                    stream: true
                }),
                signal
            });

            if (!response.ok) {
                const err = await response.json().catch(() => ({}));
                console.error('API错误:', err);
                throw new Error(err.error?.message || `HTTP ${response.status}`);
            }

            console.log('API响应正常，开始读取流...');

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            let hasOutput = false;

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop() || '';
                for (const line of lines) {
                    if (line.startsWith('data:')) {
                        const data = line.slice(5).trim();
                        if (data === '[DONE]') continue;
                        try {
                            const json = JSON.parse(data);
                            const content = json.choices?.[0]?.delta?.content;
                            if (content) {
                                hasOutput = true;
                                onChunk(content);
                            }
                        } catch (e) {}
                    }
                }
            }
            
            if (!hasOutput) {
                console.warn('第三方API无输出');
            }
        }

        // ==================== 发送消息 ====================
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const question = input.value.trim();
            if (!question) return showToast('请输入问题', 'warning');

            input.value = '';
            document.getElementById('charCount').textContent = '0 字';
            latestQuestion = question;
            saveLatestQuestion();

            // 统计可调用的窗口
            const activeWins = config.windows.slice(0, winCount);
            const callable = activeWins.filter(win => {
                if (win.source === 'coze') {
                    const cw = config.coze.workflows[win.cozeIndex];
                    return config.coze.apiToken && cw && cw.workflowId;
                } else if (win.source === 'platform' && win.platformIndex >= 0) {
                    const pc = config.platforms[win.platformIndex];
                    return pc && pc.connected && pc.model;
                }
                return false;
            });

            if (callable.length === 0) return showToast('请先配置至少一个数据源', 'warning');

            pendingReqs = callable.length;
            totalReqs = callable.length;
            updateReqStatus();

            activeWins.forEach(async (win) => {
                let prompt = question;
                let canCall = false;
                let callType = '';
                let callIndex = -1;

                console.log('窗口配置:', win.id, 'source:', win.source, 'cozeIndex:', win.cozeIndex, 'platformIndex:', win.platformIndex);

                if (win.source === 'coze') {
                    const cw = config.coze.workflows[win.cozeIndex];
                    console.log('Coze工作流配置:', cw);
                    if (config.coze.apiToken && cw?.workflowId) {
                        canCall = true;
                        callType = 'coze';
                        callIndex = win.cozeIndex;
                        if (cw.systemPrompt) prompt = `${cw.systemPrompt}\n\n用户问题：${question}`;
                        if (win.systemPrompt) prompt = `${win.systemPrompt}\n\n${prompt}`;
                    } else {
                        console.warn('Coze配置不完整: apiToken=', !!config.coze.apiToken, 'workflowId=', cw?.workflowId);
                    }
                } else if (win.source === 'platform' && win.platformIndex >= 0) {
                    const pc = config.platforms[win.platformIndex];
                    console.log('平台配置:', pc);
                    if (pc?.connected && pc?.model) {
                        canCall = true;
                        callType = 'platform';
                        callIndex = win.platformIndex;
                        if (win.systemPrompt) prompt = `${win.systemPrompt}\n\n用户问题：${question}`;
                    } else {
                        console.warn('平台配置不完整: connected=', pc?.connected, 'model=', pc?.model);
                    }
                }

                if (!canCall) {
                    console.warn('窗口', win.id, '无法调用');
                    return;
                }

                addMessage(win.id, question, 'user');
                const msgIdx = addMessage(win.id, '', 'ai', true);

                const stopBtn = document.querySelector(`.stop-win[data-id="${win.id}"]`);
                if (stopBtn) stopBtn.disabled = false;

                const controller = new AbortController();
                abortControllers[win.id] = controller;

                let fullAnswer = '';

                try {
                    const onChunk = (chunk) => {
                        fullAnswer += chunk;
                        // 不再压缩空行，直接更新
                        updateMessage(win.id, msgIdx, fullAnswer, true);
                    };

                    if (callType === 'coze') {
                        const convId = cozeConversationIds[win.id] || null;
                        const cozeResult = await callCozeWorkflow(
                            config.coze.workflows[callIndex].workflowId,
                            prompt, onChunk, controller.signal, convId, null
                        );
                        if (cozeResult.convId) cozeConversationIds[win.id] = cozeResult.convId;
                        // 联网来源面板现在由 updateMessage 函数自动处理
                    } else if (callType === 'platform') {
                        await callPlatformAPI(callIndex, prompt, onChunk, controller.signal);
                    }

                    const finalAnswer = fullAnswer || '（无输出）';
                    updateMessage(win.id, msgIdx, finalAnswer, false);
                } catch (err) {
                    if (err.name === 'AbortError') {
                        updateMessage(win.id, msgIdx, '已停止', false);
                    } else {
                        updateMessage(win.id, msgIdx, `错误：${err.message}`, false);
                    }
                } finally {
                    if (stopBtn) stopBtn.disabled = true;
                    abortControllers[win.id] = null;
                    onOneComplete();
                }
            });
        }

        // ==================== 渲染总结模型下拉菜单 ====================
        function renderSummarySourceSelect() {
            const select = document.getElementById('summarySourceSelect');
            if (!select) return;
            
            const summaryWin = config.windows[3];
            let options = '';
            
            // Coze工作流
            const cozeGroup = config.coze.workflows.map((cw, ci) => {
                const selected = summaryWin.source === 'coze' && summaryWin.cozeIndex === ci ? 'selected' : '';
                return `<option value="coze:${ci}" ${selected}>${cw?.name || `工作流${ci + 1}`}</option>`;
            }).join('');
            
            // 已连接的平台
            const platformGroup = config.platforms.map((p, pi) => {
                if (!p.connected) return '';
                const selected = summaryWin.source === 'platform' && summaryWin.platformIndex === pi ? 'selected' : '';
                return `<option value="platform:${pi}" ${selected}>${p.name}</option>`;
            }).join('');
            
            if (cozeGroup) {
                options += `<optgroup label="Coze工作流">${cozeGroup}</optgroup>`;
            }
            if (platformGroup) {
                options += `<optgroup label="第三方API">${platformGroup}</optgroup>`;
            }
            
            select.innerHTML = options;
            
            // 绑定切换事件
            select.onchange = () => {
                const value = select.value;
                if (value.startsWith('coze:')) {
                    summaryWin.source = 'coze';
                    summaryWin.cozeIndex = parseInt(value.split(':')[1]);
                    summaryWin.platformIndex = -1;
                } else if (value.startsWith('platform:')) {
                    summaryWin.source = 'platform';
                    summaryWin.platformIndex = parseInt(value.split(':')[1]);
                }
                saveConfig();
            };
        }

        // ==================== 生成总结 ====================
        async function generateSummary() {
            const summaryWin = config.windows[3];
            let canCall = false;
            let callType = '';
            let callIndex = -1;

            if (summaryWin.source === 'coze') {
                const cw = config.coze.workflows[summaryWin.cozeIndex];
                if (config.coze.apiToken && cw?.workflowId) {
                    canCall = true;
                    callType = 'coze';
                    callIndex = summaryWin.cozeIndex;
                } else {
                    return showToast('请先配置Coze工作流ID', 'error');
                }
            } else if (summaryWin.source === 'platform' && summaryWin.platformIndex >= 0) {
                const pc = config.platforms[summaryWin.platformIndex];
                if (pc?.connected && pc?.model) {
                    canCall = true;
                    callType = 'platform';
                    callIndex = summaryWin.platformIndex;
                } else {
                    return showToast('请先连接第三方API', 'error');
                }
            }

            if (!canCall) return showToast('请先选择总结模型', 'error');

            const answers = [];
            for (let i = 0; i < 3; i++) {
                const history = chatHistories[config.windows[i].id] || [];
                const last = [...history].reverse().find(m => m.role === 'ai' && !m.loading);
                if (last) {
                    answers.push({ name: `窗口${i + 1}`, content: last.content });
                }
            }

            if (!answers.length) return showToast('没有可总结的内容', 'warning');

            let prompt = `【用户问题】\n${latestQuestion}\n\n【各模型回答】\n`;
            answers.forEach(a => prompt += `\n--- ${a.name} ---\n${a.content}\n`);
            prompt += '\n【请总结对比以上回答】';

            const container = document.getElementById('messages-summary');
            container.innerHTML = '<div class="message message-ai message-loading">正在生成总结...</div>';

            const controller = new AbortController();
            let fullAnswer = '';

            try {
                const onChunk = (chunk) => {
                    fullAnswer += chunk;
                    container.innerHTML = `<div class="message message-ai">${renderMarkdown(fullAnswer)}<button class="copy-btn" style="opacity:1" onclick="navigator.clipboard.writeText(\`${fullAnswer.replace(/`/g, '\\`')}\`);this.textContent='已复制'">复制</button></div>`;
                    container.scrollTop = container.scrollHeight;
                };

                if (callType === 'coze') {
                    await callCozeWorkflow(config.coze.workflows[callIndex].workflowId, prompt, onChunk, controller.signal);
                } else if (callType === 'platform') {
                    await callPlatformAPI(callIndex, prompt, onChunk, controller.signal);
                }

                if (!fullAnswer) container.innerHTML = '<div class="message message-ai">（无输出）</div>';
            } catch (err) {
                container.innerHTML = `<div class="message message-ai" style="color:var(--danger-color)">错误：${err.message}</div>`;
            }
        }

        document.getElementById('generateSummaryBtn').addEventListener('click', generateSummary);

        // ==================== 输入框 ====================
        const userInput = document.getElementById('userInput');
        userInput.addEventListener('input', () => {
            document.getElementById('charCount').textContent = `${userInput.value.length} 字`;
        });
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        document.getElementById('sendBtn').addEventListener('click', sendMessage);

        // ==================== 初始化 ====================
        function loadConfig() {
            document.getElementById('cozeApiToken').value = config.coze.apiToken || '';
            document.getElementById('cozeBaseUrl').value = config.coze.baseUrl || 'https://api.coze.cn';
            document.getElementById('cozeBotId').value = config.coze.botId || '';
            document.getElementById('cozeInputVariable').value = config.coze.inputVariable || 'USER_INPUT';
            
            if (config.theme !== 'default') {
                document.body.setAttribute('data-theme', config.theme);
            }
            document.documentElement.style.setProperty('--font-size', config.fontSize);
            
            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.classList.toggle('btn-primary', btn.dataset.theme === config.theme);
                btn.classList.toggle('btn-secondary', btn.dataset.theme !== config.theme);
            });
            document.querySelectorAll('.font-btn').forEach(btn => {
                btn.classList.toggle('btn-primary', btn.dataset.size === config.fontSize);
                btn.classList.toggle('btn-secondary', btn.dataset.size !== config.fontSize);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadConfig();
            winCount = config.windowCount || 3;
            renderCozeWorkflowList();
            renderPlatformList();
            renderChatWindows();
            renderSummarySourceSelect();
            updateConfigStatus();

            // 窗口数量控件
            document.getElementById('wcDec').addEventListener('click', () => setWinCount(winCount - 1));
            document.getElementById('wcInc').addEventListener('click', () => setWinCount(winCount + 1));

            // hljs 主题跟随切换
            function syncHljsTheme() {
                const dark = document.body.getAttribute('data-theme') === 'dark';
                document.getElementById('hljs-light').disabled = dark;
                document.getElementById('hljs-dark').disabled = !dark;
            }
            syncHljsTheme();
            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.addEventListener('click', () => setTimeout(syncHljsTheme, 30));
            });

            // 行距、字间距、段落间距滑块
            function applyDisplaySettings() {
                const lh = document.getElementById('lineHeightSlider').value;
                const ls = document.getElementById('letterSpacingSlider').value;
                const ps = document.getElementById('paraSpacingSlider').value;
                document.getElementById('lineHeightVal').textContent = lh;
                document.getElementById('letterSpacingVal').textContent = ls + 'px';
                document.getElementById('paraSpacingVal').textContent = ps + 'px';
                // 动态注入样式
                let styleEl = document.getElementById('dynamic-display-style');
                if (!styleEl) {
                    styleEl = document.createElement('style');
                    styleEl.id = 'dynamic-display-style';
                    document.head.appendChild(styleEl);
                }
                styleEl.textContent = `
                    .message-ai { line-height: ${lh}; letter-spacing: ${ls}px; }
                    .message-ai p { margin: ${ps}px 0; line-height: ${lh}; }
                    .message-ai li { line-height: ${lh}; }
                `;
                // 保存到 config
                config.displaySettings = { lineHeight: lh, letterSpacing: ls, paraSpacing: ps };
                saveConfig();
            }

            // 从 config 恢复
            if (config.displaySettings) {
                const ds = config.displaySettings;
                document.getElementById('lineHeightSlider').value = ds.lineHeight || 1.6;
                document.getElementById('letterSpacingSlider').value = ds.letterSpacing || 0;
                document.getElementById('paraSpacingSlider').value = ds.paraSpacing || 4;
                applyDisplaySettings();
            }

            ['lineHeightSlider', 'letterSpacingSlider', 'paraSpacingSlider'].forEach(id => {
                document.getElementById(id).addEventListener('input', applyDisplaySettings);
            });
        });
    </script>

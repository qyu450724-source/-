<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qyu的专用多模型对比助手</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="hljs-light">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-dark" disabled>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        /* ========== CSS变量 - 主题系统 ========== */
        :root {
            --bg-color: #f5f7fa;
            --side-bg: #ffffff;
            --card-bg: #ffffff;
            --card-border: #e4e7ed;
            --card-header: #f5f7fa;
            --text-primary: #1a1a1a;
            --text-secondary: #505050;
            --text-placeholder: #a0a0a0;
            --primary-color: #409eff;
            --primary-hover: #66b1ff;
            --primary-active: #3a8ee6;
            --success-color: #67c23a;
            --warning-color: #e6a23c;
            --danger-color: #f56c6c;
            --user-msg-bg: #409eff;
            --user-msg-text: #ffffff;
            --ai-msg-bg: #f0f2f5;
            --ai-msg-text: #0a0a0a;
            --input-bg: #ffffff;
            --input-border: #dcdfe6;
            --sidebar-width: 320px;
            --font-size: 14px;
            --radius: 8px;
        }

        /* 护眼模式 - 豆沙绿风格 */
        [data-theme="eye-care"] {
            --bg-color: #cce8cf;
            --side-bg: #d6ead6;
            --card-bg: #e8f4e8;
            --card-border: #a8d4a8;
            --card-header: #d6ead6;
            --text-primary: #0a3d0a;
            --text-secondary: #2d5a2d;
            --primary-color: #4a9f4a;
            --primary-hover: #5ab35a;
            --primary-active: #3a8a3a;
            --user-msg-bg: #4a9f4a;
            --user-msg-text: #ffffff;
            --ai-msg-bg: #d6ead6;
            --ai-msg-text: #0a2d0a;
            --input-bg: #e8f4e8;
            --input-border: #a8d4a8;
        }

        /* 深色模式 - 深蓝黑风格 */
        [data-theme="dark"] {
            --bg-color: #0d1117;
            --side-bg: #161b22;
            --card-bg: #21262d;
            --card-border: #30363d;
            --card-header: #161b22;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --primary-color: #58a6ff;
            --primary-hover: #79b8ff;
            --primary-active: #478be6;
            --user-msg-bg: #238636;
            --user-msg-text: #ffffff;
            --ai-msg-bg: #30363d;
            --ai-msg-text: #f0f6fc;
            --input-bg: #0d1117;
            --input-border: #30363d;
        }

        /* ========== 全局样式 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            font-size: var(--font-size);
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            transition: background-color 0.3s, color 0.3s;
        }

        /* ========== 侧边栏 ========== */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--side-bg);
            border-right: 1px solid var(--card-border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: transform 0.3s, width 0.3s;
            z-index: 100;
            overflow: hidden;
        }

        .sidebar.collapsed {
            transform: translateX(-100%);
            width: 0;
        }

        .sidebar-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--card-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card-header);
            flex-shrink: 0;
        }

        .sidebar-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        /* ========== 配置面板 ========== */
        .config-section {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            margin-bottom: 12px;
            overflow: hidden;
        }

        .config-header {
            padding: 10px 14px;
            background: var(--card-header);
            border-bottom: 1px solid var(--card-border);
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            user-select: none;
        }

        .config-header:hover {
            background: var(--card-border);
        }

        .config-header .arrow {
            transition: transform 0.3s;
        }

        .config-header.collapsed .arrow {
            transform: rotate(-90deg);
        }

        .config-body {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .config-body.hidden {
            display: none;
        }

        /* ========== 表单元素 ========== */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .form-label {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .form-input {
            padding: 8px 10px;
            border: 1px solid var(--input-border);
            border-radius: 6px;
            font-size: 13px;
            background: var(--input-bg);
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            border-color: var(--primary-color);
        }

        .form-input::placeholder {
            color: var(--text-placeholder);
        }

        .form-textarea {
            min-height: 60px;
            resize: vertical;
            font-family: inherit;
            line-height: 1.5;
        }

        .form-hint {
            font-size: 11px;
            color: var(--text-placeholder);
            line-height: 1.4;
        }

        .form-select {
            cursor: pointer;
        }

        /* ========== 按钮 ========== */
        .btn {
            padding: 8px 14px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-primary {
            background: var(--primary-color);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            background: var(--card-border);
            color: var(--text-primary);
        }

        .btn-danger {
            background: var(--danger-color);
            color: #fff;
        }

        .btn-block {
            width: 100%;
        }

        .btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        /* ========== 工作流配置项 ========== */
        .workflow-item {
            padding: 10px;
            background: var(--bg-color);
            border: 1px solid var(--card-border);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .workflow-item-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .workflow-item-title {
            font-size: 13px;
            font-weight: 600;
        }

        /* ========== 主内容区 ========== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            min-width: 0;
            position: relative;
        }

        /* ========== 顶部工具栏 ========== */
        .toolbar {
            padding: 8px 16px;
            background: var(--side-bg);
            border-bottom: 1px solid var(--card-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toolbar-btn {
            width: 32px;
            height: 32px;
            border: 1px solid var(--card-border);
            border-radius: 6px;
            background: var(--card-bg);
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.2s;
        }

        .toolbar-btn:hover {
            background: var(--primary-color);
            color: #fff;
            border-color: var(--primary-color);
        }

        .toolbar-title {
            font-size: 14px;
            font-weight: 600;
        }

        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ========== 聊天窗口容器 ========== */
        .chat-container {
            flex: 1;
            display: flex;
            gap: 8px;
            padding: 8px;
            overflow: hidden;
            min-height: 0;
        }

        /* ========== 单个聊天窗口 ========== */
        .chat-window {
            flex: 1;
            min-width: 200px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* ========== 数据源选择下拉框 ========== */
        .source-select {
            padding: 4px 8px;
            border: 1px solid var(--card-border);
            border-radius: 4px;
            background: var(--card-bg);
            color: var(--text-primary);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            outline: none;
            max-width: 120px;
            text-overflow: ellipsis;
        }

        .source-select:hover {
            border-color: var(--primary-color);
        }

        .source-select:focus {
            border-color: var(--primary-color);
        }

        /* ========== 拖拽分隔线 ========== */
        .chat-resizer {
            width: 8px;
            min-width: 8px;
            flex-shrink: 0;
            cursor: col-resize;
            position: relative;
            background: transparent;
        }
        .chat-resizer::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 2px;
            height: 48px;
            border-radius: 2px;
            background: var(--card-border);
            transition: background 0.2s, height 0.2s;
        }
        .chat-resizer:hover::after, .chat-resizer.active::after {
            background: var(--primary-color);
            height: 72px;
        }

        /* ========== 聊天窗口标题 ========== */
        .chat-header {
            padding: 8px 12px;
            background: var(--card-header);
            border-bottom: 1px solid var(--card-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            gap: 8px;
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 0;
        }

        .chat-header-title {
            font-weight: 600;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-header-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }

        .chat-header-btn {
            width: 24px;
            height: 24px;
            border: none;
            border-radius: 4px;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .chat-header-btn:hover {
            background: var(--card-border);
            color: var(--text-primary);
        }

        .chat-messages {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 0;
        }

        /* ========== 消息样式 ========== */
        .message {
            max-width: 90%;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: var(--font-size);
            line-height: 1.6;
            word-wrap: break-word;
            white-space: normal;
            position: relative;
        }

        .message-user {
            background: var(--user-msg-bg);
            color: var(--user-msg-text);
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }

        .message-ai {
            background: var(--ai-msg-bg);
            color: var(--ai-msg-text);
            margin-right: auto;
            border-bottom-left-radius: 4px;
            padding-bottom: 10px;
        }

        .message-ai p {
            margin: 0 0 8px 0;
            line-height: 1.6;
        }
        .message-ai p:last-child {
            margin-bottom: 0;
        }

        .message-loading {
            opacity: 0.85;
        }

        /* 消息操作按钮工具栏 */
        .msg-actions {
            display: flex;
            gap: 6px;
            justify-content: flex-end;
            margin-top: 6px;
            padding-top: 4px;
            border-top: 1px dashed var(--card-border);
            line-height: 1;
        }

        .msg-action-btn {
            padding: 2px 8px;
            font-size: 11px;
            background: transparent;
            border: 1px solid var(--card-border);
            border-radius: 4px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            line-height: 1.2;
        }

        .msg-action-btn:hover {
            background: var(--primary-color);
            color: #fff;
            border-color: var(--primary-color);
        }

        .msg-action-btn.retry-btn:hover {
            background: var(--warning-color);
            border-color: var(--warning-color);
        }

        /* ========== Markdown渲染样式 ========== */
        .message-ai h1, .message-ai h2, .message-ai h3, .message-ai h4 {
            margin: 10px 0 6px 0;
            font-weight: 600;
            line-height: 1.4;
            color: var(--text-primary);
        }
        .message-ai h1 { font-size: 1.4em; border-bottom: 1px solid var(--card-border); padding-bottom: 6px; }
        .message-ai h2 { font-size: 1.25em; }
        .message-ai h3 { font-size: 1.1em; }
        .message-ai h4 { font-size: 1em; }
        .message-ai ul, .message-ai ol { margin: 4px 0; padding-left: 20px; }
        .message-ai li { margin: 2px 0; line-height: 1.5; }
        .message-ai code {
            background: var(--card-border);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: Consolas, Monaco, monospace;
            font-size: 0.9em;
        }
        .message-ai pre {
            margin: 10px 0;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--card-border);
        }
        .code-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 5px 12px;
            background: #1e1e2e;
            font-size: 11px;
            color: #a0a0b8;
            font-family: Consolas, Monaco, monospace;
        }
        .code-copy-btn {
            padding: 1px 8px;
            font-size: 11px;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 3px;
            color: #ccc;
            cursor: pointer;
            transition: all 0.2s;
        }
        .code-copy-btn:hover { background: rgba(255,255,255,0.25); color: #fff; }
        .message-ai pre code {
            display: block;
            background: #f8f9fc;
            padding: 12px 14px;
            overflow-x: auto;
            font-size: 0.88em;
            line-height: 1.6;
            border-radius: 0;
        }
        [data-theme="dark"] .message-ai pre code { background: #161b22; }
        [data-theme="eye-care"] .message-ai pre code { background: #e0ede0; }
        .message-ai pre code.hljs { background: inherit; }

        /* ========== 窗口数量控件 ========== */
        .win-count-ctrl {
            display: flex;
            align-items: center;
            gap: 3px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 6px;
            padding: 2px 5px;
        }
        .win-count-btn {
            width: 22px; height: 22px;
            border: none; border-radius: 4px;
            background: transparent;
            color: var(--text-primary);
            cursor: pointer; font-size: 15px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
        }
        .win-count-btn:hover:not(:disabled) { background: var(--primary-color); color: #fff; }
        .win-count-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .win-count-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); min-width: 30px; text-align: center; }

        /* ========== 请求状态 ========== */
        .req-status {
            display: flex; align-items: center; gap: 5px;
            font-size: 11px; color: var(--text-secondary);
            background: var(--card-bg); border: 1px solid var(--card-border);
            border-radius: 6px; padding: 3px 9px;
            min-width: 70px; justify-content: center;
            transition: all 0.3s;
        }
        .req-status.running { border-color: var(--primary-color); color: var(--primary-color); }
        .req-status.done { border-color: var(--success-color); color: var(--success-color); }
        .req-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
        .req-status.running .req-dot { animation: blink 1s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

        /* ========== 联网来源面板 ========== */
        .source-panel {
            margin-top: 12px;
            border-top: 1px dashed var(--card-border);
            padding-top: 10px;
            font-size: 12px;
        }
        .search-status {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }
        .search-status:hover {
            transform: translateX(2px);
        }
        .search-status.searched {
            background: linear-gradient(135deg, rgba(64,158,255,0.15) 0%, rgba(64,158,255,0.08) 100%);
            border: 1px solid rgba(64,158,255,0.4);
            color: var(--primary-color);
        }
        .search-status.searched:hover {
            background: linear-gradient(135deg, rgba(64,158,255,0.2) 0%, rgba(64,158,255,0.12) 100%);
        }
        .search-status.no-search {
            background: var(--bg-color);
            border: 1px solid var(--card-border);
            color: var(--text-secondary);
            cursor: default;
        }
        .search-count {
            background: var(--primary-color);
            color: #fff;
            border-radius: 10px;
            padding: 2px 8px;
            font-size: 11px;
            font-weight: 600;
        }
        .source-expand-btn {
            margin-left: auto;
            font-size: 11px;
            opacity: 0.9;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .source-expand-btn::after {
            content: '▸';
            transition: transform 0.3s;
            display: inline-block;
        }
        .source-panel.open .source-expand-btn::after {
            transform: rotate(90deg);
        }
        .source-list {
            display: none;
            flex-direction: column;
            gap: 6px;
            margin-top: 10px;
            padding-left: 8px;
            border-left: 3px solid var(--primary-color);
            margin-left: 4px;
        }
        .source-panel.open .source-list {
            display: flex;
            animation: slideDown 0.25s ease-out;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .source-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 8px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.2s;
        }
        .source-item:hover {
            border-color: var(--primary-color);
            background: var(--card-header);
            transform: translateX(4px);
            box-shadow: 0 2px 8px rgba(64,158,255,0.15);
        }
        .source-num {
            flex-shrink: 0;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--primary-color);
            color: #fff;
            font-size: 11px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 1px;
        }
        .source-info { flex: 1; min-width: 0; }
        .source-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--primary-color);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .source-url {
            font-size: 10px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }
        .typing-dots { display: inline-flex; align-items: center; gap: 4px; padding: 2px 0; }
        .typing-dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--text-secondary); animation: tdot 1.2s infinite ease-in-out; }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes tdot { 0%,80%,100%{transform:translateY(0);opacity:.4} 40%{transform:translateY(-6px);opacity:1} }
        .message-ai blockquote {
            border-left: 3px solid var(--primary-color);
            padding-left: 12px;
            margin: 10px 0;
            color: var(--text-secondary);
        }
        .message-ai table {
            border-collapse: collapse;
            width: 100%;
            margin: 10px 0;
        }
        .message-ai th, .message-ai td {
            border: 1px solid var(--card-border);
            padding: 8px 12px;
            text-align: left;
        }
        .message-ai th {
            background: var(--card-header);
            font-weight: 600;
        }
        .message-ai tr:nth-child(even) { background: var(--card-header); }
        .message-ai hr { border: none; border-top: 1px solid var(--card-border); margin: 12px 0; }
        .message-ai strong { font-weight: 600; }
        .message-ai em { font-style: italic; }
        .message-ai a { color: var(--primary-color); text-decoration: none; }
        .message-ai a:hover { text-decoration: underline; }

        /* ========== 底部输入区 ========== */
        .input-area {
            padding: 12px;
            background: var(--side-bg);
            border-top: 1px solid var(--card-border);
            flex-shrink: 0;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: stretch;
        }

        .input-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-textarea {
            width: 100%;
            min-height: 48px;
            max-height: 120px;
            padding: 10px 14px;
            border: 1px solid var(--input-border);
            border-radius: 8px;
            font-size: var(--font-size);
            font-family: inherit;
            background: var(--input-bg);
            color: var(--text-primary);
            outline: none;
            resize: none;
            line-height: 1.5;
        }

        .input-textarea:focus {
            border-color: var(--primary-color);
        }

        .input-textarea::placeholder {
            color: var(--text-placeholder);
        }

        .input-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .char-count {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .send-btn {
            padding: 0 28px;
            font-size: 14px;
            height: 48px;
        }

        /* ========== 总结窗口悬浮按钮 ========== */
        .summary-toggle-btn {
            position: fixed;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 36px;
            height: 80px;
            background: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 8px 0 0 8px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            font-size: 12px;
            font-weight: 600;
            z-index: 200;
            transition: all 0.3s;
            box-shadow: -2px 0 10px rgba(0,0,0,0.1);
        }

        .summary-toggle-btn:hover {
            width: 44px;
            background: var(--primary-hover);
        }

        .summary-toggle-btn.hidden {
            transform: translateY(-50%) translateX(100%);
        }

        /* ========== 总结侧边栏 ========== */
        .summary-sidebar {
            position: fixed;
            right: 0;
            top: 0;
            width: 520px;
            height: 100vh;
            background: var(--side-bg);
            border-left: 1px solid var(--card-border);
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.3s;
            z-index: 199;
        }

        .summary-sidebar.show {
            transform: translateX(0);
        }

        .summary-sidebar-header {
            padding: 10px 14px;
            border-bottom: 1px solid var(--card-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card-header);
        }

        .summary-sidebar-title {
            font-size: 14px;
            font-weight: 600;
        }

        .summary-sidebar-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .summary-chat-window {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .summary-chat-messages {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .summary-footer {
            padding: 10px 12px;
            border-top: 1px solid var(--card-border);
            background: var(--card-header);
        }

        .summary-info {
            padding: 10px 12px;
            background: var(--bg-color);
            border-bottom: 1px solid var(--card-border);
            font-size: 11px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        /* ========== Toast提示 ========== */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .toast.show { opacity: 1; }
        .toast-success { background: var(--success-color); color: #fff; }
        .toast-error { background: var(--danger-color); color: #fff; }
        .toast-warning { background: var(--warning-color); color: #fff; }

        /* ========== 滚动条 ========== */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-placeholder); }

        /* ========== 平台标签 ========== */
        .platform-tag {
            display: inline-block;

        .platform-tag.zhipu { background: #e0f7fa; color: #00838f; }
    </style>
</head>
<body>
    <!-- Toast提示 -->
    <div class="toast" id="toast"></div>

    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-title">⚙️ 配置中心</span>
        </div>
        <div class="sidebar-content">
            <!-- API配置（隐藏） -->
            <div style="display:none;">
            <!-- Coze 对话流配置（隐藏） -->
            <div class="config-section" style="display:none;">
                <div class="config-header" data-section="coze-config">
                    <span>🤖 Coze 对话流</span>
                    <span class="arrow">▼</span>
                </div>
                <div class="config-body" id="coze-config">
                    <div class="form-group">
                        <label class="form-label">API Token</label>
                        <input type="password" class="form-input" id="cozeApiToken" placeholder="粘贴Coze API Token">
                    </div>
                    <div class="form-group">

                        <input type="text" class="form-input" id="cozeBaseUrl" value="https://api.coze.cn">
                    </div>
                    <div class="form-group" style="display:none;">
                        <label class="form-label">Bot ID</label>
                        <input type="text" class="form-input" id="cozeBotId" placeholder="对话流必填，URL中 bot/ 后的数字">

                    </div>
                    <div class="form-group">
                        <label class="form-label">输入变量名</label>
                        <input type="text" class="form-input" id="cozeInputVariable" value="USER_INPUT" placeholder="对话流固定为 USER_INPUT">
                        <div class="form-hint" style="margin-top:2px;">对话流固定填 USER_INPUT；普通工作流填开始节点的变量名</div>
                    </div>
                    <div style="font-size:11px;color:var(--text-secondary);margin:10px 0 6px;font-weight:600;">Coze工作流（4个）</div>

            <!-- 第三方 API 配置（隐藏） -->

                    <div id="platformList"></div>

            </div>
            </div>

            <!-- 显示设置 -->
            <div class="config-section">
                <div class="config-header" data-section="display-config">
                    <span>🎨 显示设置</span>
                    <span class="arrow">▼</span>
                </div>
                <div class="config-body" id="display-config">
                    <div class="form-group">
                        <label class="form-label">主题模式</label>

                    <div class="form-group">
                        <label class="form-label">字体大小</label>

                            <button class="btn btn-secondary font-btn" data-size="13px">小</button>

                    <div class="form-group">
                        <label class="form-label" style="display:flex;justify-content:space-between;">
                            <span>行间距</span><span id="lineHeightVal" style="color:var(--primary-color);font-weight:600;">1.6</span>
                        </label>
                        <input type="range" id="lineHeightSlider" min="1.2" max="2.4" step="0.1" value="1.6"
                            style="width:100%;accent-color:var(--primary-color);">

                    <div class="form-group">
                        <label class="form-label" style="display:flex;justify-content:space-between;">
                            <span>段落间距</span><span id="paraSpacingVal" style="color:var(--primary-color);font-weight:600;">4px</span>
                        </label>
                        <input type="range" id="paraSpacingSlider" min="0" max="20" step="1" value="4"
                            style="width:100%;accent-color:var(--primary-color);">
                    </div>

            </div>

            <!-- 数据管理 -->
            <div class="config-section">
                <div class="config-header" data-section="data-config">
                    <span>📂 数据管理</span>
                    <span class="arrow">▼</span>
                </div>
                <div class="config-body" id="data-config">
                    <div class="btn-group">
                        <button class="btn btn-primary" id="importConfig">📥 导入配置</button>
                        <button class="btn btn-secondary" id="exportChat">📤 导出聊天</button>
                    </div>
                    <input type="file" id="importConfigFile" accept=".json" style="display:none">
                    <div class="btn-group" style="margin-top:8px;">
                        <button class="btn btn-danger" id="clearChat">🗑️ 清空聊天</button>
                    </div>

    <!-- 主内容区 -->
    <main class="main-content">
        <div class="toolbar">
            <div class="toolbar-left">
                <button class="toolbar-btn" id="toggleSidebar" title="切换侧边栏">☰</button>
                <span class="toolbar-title">Qyu的专用多模型对比助手</span>
            </div>

                <div class="win-count-ctrl" title="并行窗口数量">

                    <span class="req-dot"></span>
                    <span id="reqText">就绪</span>
                </div>

                <span id="configStatus" style="font-size: 11px; color: var(--danger-color);">未配置</span>
            </div>
        </div>

        <div class="chat-container" id="chatContainer"></div>

        <div class="input-area">
            <div class="input-wrapper">
                <div class="input-box">
                    <textarea class="input-textarea" id="userInput" placeholder="输入问题，所有模型将同时响应...（Shift+Enter换行）"></textarea>
                    <div class="input-footer">
                        <span class="char-count" id="charCount">0 字</span>
                    </div>
                </div>
                <button class="btn btn-primary send-btn" id="sendBtn">发送</button>
            </div>
        </div>
    </main>

    <!-- 总结窗口 -->
    <button class="summary-toggle-btn" id="summaryToggleBtn">
        <span>📝</span><span>总</span><span>结</span>
    </button>

    <div class="summary-sidebar" id="summarySidebar">
        <div class="summary-sidebar-header">
            <span class="summary-sidebar-title">📝 内容总结</span>
            <button class="toolbar-btn" id="closeSummarySidebar" style="width:24px;height:24px;">×</button>
        </div>
        <div class="summary-info">选择模型后点击生成，收集前3个窗口的回答进行汇总。</div>
        <div class="summary-sidebar-content">
            <div class="summary-chat-window">
                <div class="summary-chat-messages" id="messages-summary"></div>
            </div>
        </div>
        <div class="summary-footer">
            <div class="form-group" style="margin-bottom:8px;">
                <label class="form-label" style="font-size:11px;">总结模型</label>
                <select class="form-input form-select" id="summarySourceSelect" style="font-size:12px;"></select>
            </div>
            <button class="btn btn-primary btn-block" id="generateSummaryBtn">生成总结</button>
        </div>
    </div>

    <script>
        // ==================== 默认配置 ====================
        const DEFAULT_CONFIG = {
            // Coze配置
            coze: {
                apiToken: '',
                baseUrl: 'https://api.coze.cn',
                botId: '',
                inputVariable: 'USER_INPUT',  // 输入变量名，与工作流开始节点一致
                workflows: [
                    { id: '1', name: '工作流1', workflowId: '', systemPrompt: '', type: 'chatflow' },
                    { id: '2', name: '工作流2', workflowId: '', systemPrompt: '', type: 'chatflow' },
                    { id: '3', name: '工作流3', workflowId: '', systemPrompt: '', type: 'chatflow' },
                    { id: '4', name: '总结工作流', workflowId: '', systemPrompt: '你是一个专业的内容总结专家，需要基于用户提供的多个模型的回答，提炼核心观点，对比不同模型的回答差异，给出清晰易懂的总结。', type: 'chatflow' }
                ]
            },
            // 多平台API配置（3个可自定义）
            platforms: [
                { id: '1', name: '平台1', baseUrl: '', apiKey: '', model: '', models: [], connected: false },
                { id: '2', name: '平台2', baseUrl: '', apiKey: '', model: '', models: [], connected: false },
                { id: '3', name: '平台3', baseUrl: '', apiKey: '', model: '', models: [], connected: false }
            ],
            // 窗口配置：每个窗口选择使用Coze还是其他平台
            windows: [
                { id: '1', source: 'coze', cozeIndex: 0, platformIndex: -1, systemPrompt: '' },
                { id: '2', source: 'coze', cozeIndex: 1, platformIndex: -1, systemPrompt: '' },
                { id: '3', source: 'coze', cozeIndex: 2, platformIndex: -1, systemPrompt: '' },
                { id: '4', source: 'coze', cozeIndex: 3, platformIndex: -1, systemPrompt: '' }
            ],
            theme: 'default',
            fontSize: '14px'
        };

        // ==================== 加载配置 ====================
        let config = JSON.parse(localStorage.getItem('multiModelConfig')) || JSON.parse(JSON.stringify(DEFAULT_CONFIG));
        let chatHistories = JSON.parse(localStorage.getItem('multiModelChatHistories')) || {};
        let latestQuestion = localStorage.getItem('multiModelLatestQuestion') || '';
        let abortControllers = {};
        // 每个窗口的 CONVERSATION_NAME，首次生成后固定，靠它让 Coze 记忆节点识别同一对话
        var cozeConversationIds = {};

        function getConvName(windowId) {
            if (!cozeConversationIds[windowId]) {
                cozeConversationIds[windowId] = 'win' + windowId + '_' + Math.random().toString(36).slice(2, 8);
                console.log('%c[对话名称]', 'color:#e6a23c;font-weight:bold', '窗口' + windowId + '新建:', cozeConversationIds[windowId]);
            }
            return cozeConversationIds[windowId];
        }

        // ==================== 工具函数 ====================
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast toast-${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function saveConfig() {
            localStorage.setItem('multiModelConfig', JSON.stringify(config));
        }

        function saveChatHistories() {
            localStorage.setItem('multiModelChatHistories', JSON.stringify(chatHistories));
        }

        function saveLatestQuestion() {
            localStorage.setItem('multiModelLatestQuestion', latestQuestion);
        }

        // ==================== 配置兼容性检查 ====================
        function ensureConfigStructure() {
            let needsSave = false;
            
            // 确保coze配置存在
            if (!config.coze || typeof config.coze !== 'object') {
                config.coze = JSON.parse(JSON.stringify(DEFAULT_CONFIG.coze));
                needsSave = true;
            }
            
            // 确保coze.inputVariable存在
            if (!config.coze.inputVariable) {
                config.coze.inputVariable = 'user_input';
                needsSave = true;
            }
            
            // 确保coze.workflows存在且有4个
            if (!config.coze.workflows || !Array.isArray(config.coze.workflows) || config.coze.workflows.length < 4) {
                config.coze.workflows = JSON.parse(JSON.stringify(DEFAULT_CONFIG.coze.workflows));
                needsSave = true;
            }
            
            // 确保platforms配置存在（数组格式）
            if (!config.platforms || !Array.isArray(config.platforms) || config.platforms.length < 3) {
                config.platforms = JSON.parse(JSON.stringify(DEFAULT_CONFIG.platforms));
                needsSave = true;
            }
            
            // 确保每个平台的配置完整
            config.platforms.forEach((p, i) => {
                if (!p.models) p.models = [];
                if (!p.connected) p.connected = false;
                if (!p.model) p.model = '';
            });
            
            // 确保windows配置存在
            if (!config.windows || !Array.isArray(config.windows) || config.windows.length < 4) {
                config.windows = JSON.parse(JSON.stringify(DEFAULT_CONFIG.windows));
                needsSave = true;
            }
            
            // 确保windows有platformIndex字段
            config.windows.forEach(w => {
                if (w.platformIndex === undefined) w.platformIndex = -1;
            });
            
            if (needsSave) {
                saveConfig();
                console.log('配置已更新为最新结构');
            }
        }
        
        // 执行兼容性检查
        ensureConfigStructure();

        // ==================== Markdown渲染 ====================
        // 使用 marked v9 + highlight.js
        marked.use({
            breaks: true,
            gfm: true,
            renderer: {
                code({ text, lang }) {
                    const language = lang || 'plaintext';
                    let hl;
                    try {
                        hl = hljs.getLanguage(language)
                            ? hljs.highlight(text, { language, ignoreIllegals: true }).value
                            : hljs.highlightAuto(text).value;
                    } catch(e) { hl = escapeHtml(text); }
                    return `<pre><div class="code-header"><span>${escapeHtml(language)}</span><button class="code-copy-btn" data-code="${encodeURIComponent(text)}">复制</button></div><code class="hljs">${hl}</code></pre>`;
                }
            }
        });

        // 代码块复制按钮（事件委托，避免 onclick 内联）
        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('code-copy-btn')) {
                const code = decodeURIComponent(e.target.dataset.code || '');
                navigator.clipboard.writeText(code).then(function() {
                    e.target.textContent = '已复制✓';
                    setTimeout(function() { e.target.textContent = '复制'; }, 1500);
                });
            }
        });

        function renderMarkdown(text) {
            if (!text) return '';
            try {
                // 移除 [联网搜索] 标记（如果存在）
                let processedText = text.replace(/^\[联网搜索\]\s*/i, '');
                
                // 配置 marked：让所有链接在新标签页打开
                const renderer = new marked.Renderer();
                const originalLinkRenderer = renderer.link;
                renderer.link = function(href, title, text) {
                    const link = originalLinkRenderer.call(this, href, title, text);
                    // 添加 target="_blank" 和 rel="noopener noreferrer"
                    return link.replace('<a ', '<a target="_blank" rel="noopener noreferrer" ');
                };
                
                // 不再压缩空行，让Markdown自然渲染
                return marked.parse(processedText, { renderer });
            }
            catch(e) { return escapeHtml(text); }
        }

        // ==================== 从回答中提取联网搜索来源 ====================
        function extractWebSources(content) {
            if (!content) return { hasSearch: false, sources: [] };
            
            const sources = [];
            let hasSearchMark = false;
            
            // 1. 检测 [联网搜索] 标记
            if (/^\[联网搜索\]/i.test(content.trim())) {
                hasSearchMark = true;
                console.log('[联网检测] 发现 [联网搜索] 标记');
            }
            
            // 2. 提取所有 Markdown 链接 [标题](URL)
            const mdLinkRegex = /\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g;
            let match;
            while ((match = mdLinkRegex.exec(content)) !== null) {
                const title = match[1].trim();
                const url = match[2].trim();
                // 过滤掉一些常见的非搜索来源链接
                if (!url.includes('example.com') && 
                    !url.includes('placeholder') &&
                    title.length > 0 && 
                    title.length < 200) {
                    sources.push({ url, title });
                }
            }
            
            // 3. 提取纯 URL（不在 Markdown 格式中的）
            const urlRegex = /(?<![!\[])(https?:\/\/[^\s<>\[\]()'"`]+)/g;
            while ((match = urlRegex.exec(content)) !== null) {
                const url = match[1].trim();
                // 去除末尾标点
                const cleanUrl = url.replace(/[.,;:!?)\]}>]+$/, '');
                // 避免重复
                if (!sources.find(s => s.url === cleanUrl)) {
                    sources.push({ url: cleanUrl, title: cleanUrl });
                }
            }
            
            // 去重
            const uniqueSources = sources.filter((s, i, arr) => 
                arr.findIndex(x => x.url === s.url) === i
            );
            
            // 判断是否进行了联网搜索：有标记 或 有链接
            const hasSearch = hasSearchMark || uniqueSources.length > 0;
            
            console.log('[联网检测] hasSearchMark:', hasSearchMark, '链接数:', uniqueSources.length);
            
            return { hasSearch, sources: uniqueSources };
        }

        // ==================== 连接API获取模型列表 ====================
        async function connectPlatform(index) {
            const nameInput = document.querySelector(`.platform-name[data-index="${index}"]`);
            const urlInput = document.querySelector(`.platform-url[data-index="${index}"]`);
            const keyInput = document.querySelector(`.platform-key[data-index="${index}"]`);
            const connectBtn = document.querySelector(`.connect-btn[data-index="${index}"]`);
            const modelSelect = document.querySelector(`.platform-model[data-index="${index}"]`);
            const statusSpan = document.querySelector(`.connect-status[data-index="${index}"]`);

            const baseUrl = urlInput.value.trim();
            const apiKey = keyInput.value.trim();

            if (!baseUrl || !apiKey) {
                showToast('请填写API地址和Key', 'warning');
                return;
            }

            connectBtn.disabled = true;
            connectBtn.textContent = '连接中...';
            statusSpan.textContent = '';
            statusSpan.style.color = 'var(--text-secondary)';

            try {
                // 调用OpenAI兼容的models接口
                const response = await fetch(`${baseUrl}/v1/models`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    const err = await response.json().catch(() => ({}));
                    throw new Error(err.error?.message || `HTTP ${response.status}`);
                }

                const data = await response.json();
                const models = data.data || data.models || [];
                
                if (models.length === 0) {
                    throw new Error('未获取到模型列表');
                }

                // 更新配置
                config.platforms[index].name = nameInput.value;
                config.platforms[index].baseUrl = baseUrl;
                config.platforms[index].apiKey = apiKey;
                config.platforms[index].models = models.map(m => m.id || m);
                config.platforms[index].connected = true;
                // 自动选择第一个模型
                config.platforms[index].model = config.platforms[index].models[0];
                saveConfig();

                // 更新模型下拉框
                modelSelect.innerHTML = config.platforms[index].models.map(m => 
                    `<option value="${m}" ${m === config.platforms[index].model ? 'selected' : ''}>${m}</option>`
                ).join('');
                modelSelect.disabled = false;

                // 更新状态
                connectBtn.textContent = '已连接';
                connectBtn.style.background = 'var(--success-color)';
                statusSpan.textContent = `✓ 获取到 ${models.length} 个模型`;
                statusSpan.style.color = 'var(--success-color)';

                showToast('连接成功！', 'success');
                renderChatWindows(); // 刷新窗口下拉菜单

            } catch (err) {
                connectBtn.disabled = false;
                connectBtn.textContent = '连接';
                connectBtn.style.background = '';
                statusSpan.textContent = `✗ ${err.message}`;
                statusSpan.style.color = 'var(--danger-color)';
                showToast(`连接失败：${err.message}`, 'error');
            }
        }

        // ==================== 数据管理 ====================
        // 简单加密/解密函数（XOR加密）
        function encrypt(text, password) {
            let result = '';
            for (let i = 0; i < text.length; i++) {
                result += String.fromCharCode(text.charCodeAt(i) ^ password.charCodeAt(i % password.length));
            }
            return btoa(unescape(encodeURIComponent(result)));
        }

        function decrypt(encoded, password) {
            try {
                const text = decodeURIComponent(escape(atob(encoded)));
                let result = '';
                for (let i = 0; i < text.length; i++) {
                    result += String.fromCharCode(text.charCodeAt(i) ^ password.charCodeAt(i % password.length));
                }
                return result;
            } catch (e) {
                return null;
            }
        }

        document.getElementById('importConfigFile').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const importData = JSON.parse(event.target.result);
                    
                    // 检查时效性
                    if (importData.expireTime) {
                        const remaining = importData.expireTime - Date.now();
                        if (remaining <= 0) {
                            showToast('傻鸟~哈哈', 'error');
                            return;
                        }
                        const mins = Math.ceil(remaining / 60000);
                        console.log(`[配置] 剩余有效时间: ${mins}分钟`);
                    }
                    
                    // 检查是否是加密配置
                    if (importData.encrypted) {
                        const password = prompt('此配置已加密，请输入密码：');
                        if (!password) {
                            showToast('已取消导入', 'warning');
                            return;
                        }
                        
                        const decrypted = decrypt(importData.encrypted, password);
                        if (!decrypted) {
                            showToast('密码错误或文件损坏', 'error');
                            return;
                        }
                        
                        try {
                            config = JSON.parse(decrypted);
                        } catch (err) {
                            showToast('密码错误', 'error');
                            return;
                        }
                    } else if (importData.config) {

                        return;

        // ==================== 窗口数量 & 请求状态 ====================
        var winCount = config.windowCount || 3;
        var pendingReqs = 0, totalReqs = 0;

        function setWinCount(n) {
            var newCount = Math.max(2, Math.min(4, n));
            // 如果窗口数减少，强制停止被隐藏窗口的请求
            if (newCount < winCount) {
                for (var i = newCount; i < winCount; i++) {
                    var hiddenWin = config.windows[i];
                    if (hiddenWin && abortControllers[hiddenWin.id]) {
                        abortControllers[hiddenWin.id].abort();
                        abortControllers[hiddenWin.id] = null;
                    }
                }
            }
            winCount = newCount;
            config.windowCount = winCount;
            // 补全 windows 配置
            while (config.windows.length < winCount) {
                var idx = config.windows.length;
                config.windows.push({ id: String(idx + 1), source: 'coze', cozeIndex: idx, platformIndex: -1, systemPrompt: '' });
            }
            saveConfig();
            renderChatWindows();
        }

            } else {
                el.className = 'req-status running';
                txt.textContent = (totalReqs - pendingReqs) + '/' + totalReqs + ' 响应';
            }
        }

        function onOneComplete() {
            pendingReqs = Math.max(0, pendingReqs - 1);
            if (pendingReqs === 0) {

                var txt = document.getElementById('reqText');
                if (el) el.className = 'req-status done';
